<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskIt</title>
    <link rel="stylesheet" href="auth.css">
    <script
      src="https://kit.fontawesome.com/5be89bdbaf.js"
      crossorigin="anonymous"
    ></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <h2>Create an Account</h2>
            <p class="auth-subtitle">Join us and start organizing your life today.</p>
            
            <form action="#" class="auth-form">
                <div class="form-group">
                    <label for="name"></label>
                    <div class="input-icon">
                        <i class="fa fa-user"></i>
                        <input type="text" id="name" placeholder="Name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email"></label>
                    <div class="input-icon">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password"></label>
                    <div class="input-icon">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password"></label>
                    <div class="input-icon">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                    </div>
                </div>
                <label for="showpassword"
                ><input type="checkbox" name="showpassword" id="showpassword" />
                Show password</label
                >
                <button type="submit" class="auth-btn">Register</button>
                
                <p class="auth-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <footer>
        <div class="left copyright">
            <p>Copyright &copy; 2026 TaskIt. All rights reserved.</p>
        </div>
        <div class="right social-links">
            <ul>
                <li><a href="#"><i class="fa fa-facebook"></i></a></li>
                <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                <li><a href="#"><i class="fa fa-instagram"></i></a></li>
                <li><a href="#"><i class="fa fa-linkedin"></i></a></li>
            </ul>
        </div>
    </footer>
</body>
<script src="pswrd.js"></script>
<script type="module" src="supabaseclient.js"></script>
<script type="module" src="registerauth.js"></script>
</html>
